<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>trndly — Web App UI Kit</title>

<!-- Fonts -->
<link rel="preconnect" href="https://rsms.me/"/>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..800,0..100,0..1&display=swap"/>

<!-- Design tokens -->
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="colors_and_type.css"/>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- API caching/refresh is handled by a small in-house useFetch hook inside dataProvider.js. SWR is intentionally not loaded — it ships ESM only as of 2.x, which doesn't fit this no-build setup. -->


<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    background: #fbf6ee;
    color: #1a1a1a;
  }
  /* Subtle "just added" entrance played once on the freshly-created
     inventory tile after redirect. Soft scale + fade with a transient
     mustard halo so the user's eye lands on it without ceremony. */
  @keyframes tile-pop-in {
    0%   { transform: translateY(8px) scale(0.94); opacity: 0; box-shadow: 2px 2px 0 0 #1a1a1a; }
    55%  { transform: translateY(-2px) scale(1.02); opacity: 1; box-shadow: 4px 4px 0 0 #e8b840; }
    100% { transform: translateY(0)    scale(1);    opacity: 1; box-shadow: 2px 2px 0 0 #1a1a1a; }
  }
  .tile-just-added { animation: tile-pop-in 700ms cubic-bezier(0.34, 1.4, 0.64, 1) both; }
</style>
</head>
<body>

<!-- Mount target must exist before Babel runs App.jsx (external babel scripts load async). -->
<div id="root"></div>

<!-- Cache-bust query (`?v=…`) is appended to every local script src below.
     Rationale: babel-standalone transpiles JSX in the browser, so any tweak
     to a .jsx file requires the browser to actually re-fetch it; without a
     query parameter the HTTP cache + babel's in-memory transform cache will
     serve the previous build. Bump `v` (or use a timestamp) when you want
     to force a fresh load during development. -->

<!-- Helpers + LOOKUP_OPTIONS seed (colorSpectrum / productGroup not in /options yet) -->
<script src="data.js?v=13"></script>

<!-- API adapter: fetches /options + /trends + /health and reshapes to the frontend's contract -->
<script src="api.js?v=13"></script>

<!-- Demo auth (window.AuthProvider, window.useAuth) -->
<script type="text/babel" src="auth.js?v=10"></script>

<!-- Session-scoped data store (window.DataProvider, window.useData, window.useFetch) -->
<script type="text/babel" src="dataProvider.js?v=13"></script>

<!-- Components — order matters: leaves first, then composites -->
<script type="text/babel" src="components/Tag.jsx?v=9"></script>
<script type="text/babel" src="components/Button.jsx?v=9"></script>
<script type="text/babel" src="components/Chart.jsx?v=12"></script>
<script type="text/babel" src="components/ItemGraphic.jsx?v=9"></script>
<script type="text/babel" src="components/TrendCard.jsx?v=10"></script>
<script type="text/babel" src="components/Sidebar.jsx?v=10"></script>

<!-- Screens -->
<script type="text/babel" src="screens/ScreenLogin.jsx?v=9"></script>
<script type="text/babel" src="screens/ScreenHighlights.jsx?v=13"></script>
<script type="text/babel" src="screens/ScreenTrends.jsx?v=13"></script>
<script type="text/babel" src="screens/ScreenInventory.jsx?v=11"></script>
<script type="text/babel" src="screens/ScreenItem.jsx?v=13"></script>
<script type="text/babel" src="screens/ScreenAdd.jsx?v=11"></script>
<script type="text/babel" src="screens/ScreenSettings.jsx?v=9"></script>

<!-- Root -->
<script type="text/babel" src="App.jsx?v=9"></script>

</body>
</html>
