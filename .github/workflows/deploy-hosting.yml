name: deploy-hosting

# Deploy the static SPA + published JSON to Firebase Hosting on push to main.
#
# GATE (plan §5, non-negotiable): the `deploy` job `needs: [test]`. The
# tests/serving golden diff is the ONLY thing catching lag-join drift
# (contracts.py does NOT validate share_lag*/share_t) — never deploy on red.
#
# AUTH: keyless via Workload Identity Federation (no FIREBASE_TOKEN, no SA key).
# Requires the WIF pool/provider + deploy SA from infra/ci_identity.tf, exposed
# to this repo as Actions variables WIF_PROVIDER and DEPLOY_SA. See
# docs/runbooks/deploy-hosting.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trndly
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: trndly/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Golden serving gate (lag-join diff)
        run: pytest tests/serving -v

  deploy:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # id-token: write is required for the OIDC token WIF exchanges for GCP creds.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF, keyless)
        uses: google-github-actions/auth@v2
        with:
          project_id: ml-ops-491417
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        working-directory: trndly
        # firebase-tools uses the ADC that the auth step exported via
        # GOOGLE_APPLICATION_CREDENTIALS — no token flag needed.
        run: firebase deploy --only hosting:trndly --project ml-ops-491417 --non-interactive
