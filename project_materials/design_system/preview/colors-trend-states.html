<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://rsms.me/"/>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);font-family:var(--font-sans);padding:20px;-webkit-font-smoothing:antialiased}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{border:2px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
.chip{height:72px}
.info{padding:10px 12px;background:var(--color-surface-1)}
.state{font-size:13px;font-weight:700;color:var(--color-text-primary);display:flex;align-items:center;gap:6px}
.meaning{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.hex{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);margin-top:2px}
</style>
</head>
<body>
<div class="row">
  <div class="card">
    <div class="chip" style="background:var(--color-trend-rising)"></div>
    <div class="info">
      <div class="state">↗ rising</div>
      <div class="meaning">Buy / stock up now</div>
      <div class="hex">#2d5e3e · forest</div>
    </div>
  </div>
  <div class="card">
    <div class="chip" style="background:var(--color-trend-peak)"></div>
    <div class="info">
      <div class="state">● peak</div>
      <div class="meaning">At maximum — sell now</div>
      <div class="hex">#e8b840 · mustard</div>
    </div>
  </div>
  <div class="card">
    <div class="chip" style="background:var(--color-trend-falling)"></div>
    <div class="info">
      <div class="state">↘ falling</div>
      <div class="meaning">Declining — list immediately</div>
      <div class="hex">#c64a3a · rust</div>
    </div>
  </div>
  <div class="card">
    <div class="chip" style="background:var(--color-trend-flat)"></div>
    <div class="info">
      <div class="state">→ flat</div>
      <div class="meaning">Stable, no urgency</div>
      <div class="hex">#8a8275 · warm grey</div>
    </div>
  </div>
</div>
</body>
</html>
