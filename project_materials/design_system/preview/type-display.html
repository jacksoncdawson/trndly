<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://rsms.me/"/>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..800,0..100,0..1&display=swap"/>
<link rel="stylesheet" href="../tokens.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);font-family:var(--font-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}
.row{display:grid;grid-template-columns:120px 1fr;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--color-border-soft);gap:16px}
.row:last-child{border-bottom:none}
.label{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary);line-height:1.4}
</style>
</head>
<body>
  <div class="row">
    <div class="label">4xl · display</div>
    <div style="font-family:var(--font-display);font-size:var(--text-4xl);font-weight:800;line-height:1;letter-spacing:var(--tracking-tight);font-variation-settings:'SOFT' 50">$84</div>
  </div>
  <div class="row">
    <div class="label">3xl · h1</div>
    <div style="font-family:var(--font-display);font-size:var(--text-3xl);font-weight:800;line-height:var(--leading-tight);letter-spacing:var(--tracking-tight);font-variation-settings:'SOFT' 50">Stock burgundy now</div>
  </div>
  <div class="row">
    <div class="label">2xl · h2</div>
    <div style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:800;line-height:var(--leading-tight);letter-spacing:var(--tracking-tight);font-variation-settings:'SOFT' 50">Listing timeline</div>
  </div>
  <div class="row">
    <div class="label">xl · h3</div>
    <div style="font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;line-height:var(--leading-snug);font-variation-settings:'SOFT' 50">Hold for 1 month</div>
  </div>
  <div class="row">
    <div class="label">lg · h4</div>
    <div style="font-family:var(--font-display);font-size:var(--text-lg);font-weight:800;font-variation-settings:'SOFT' 50">Burgundy linen blazer</div>
  </div>
</body>
</html>
