<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://rsms.me/"/>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);font-family:var(--font-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}
.group{margin-bottom:16px}
.group:last-child{margin-bottom:0}
.group-label{font-family:var(--font-mono);font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:var(--radius-full);
  font-size:var(--text-xs);font-weight:600;
  border:2px solid var(--color-border);background:var(--color-surface-1);
  color:var(--color-text-primary);
}
.tag-rising{background:var(--color-trend-rising-soft)}
.tag-peak{background:var(--color-trend-peak-soft)}
.tag-falling{background:var(--color-trend-falling-soft)}
.tag-flat{background:var(--color-trend-flat-soft);color:var(--color-text-secondary)}
.tag-rust{background:var(--color-pop-rust-soft)}
.tag-sky{background:var(--color-pop-sky-soft)}
.tag-plum{background:var(--color-pop-plum-soft)}
.tag-sage{background:var(--color-pop-sage-soft)}
.tag-mustard{background:var(--color-pop-mustard-soft)}
</style>
</head>
<body>
  <div class="group">
    <div class="group-label">Trend states</div>
    <div class="tags">
      <span class="tag tag-rising">↗ rising</span>
      <span class="tag tag-peak">● peak</span>
      <span class="tag tag-falling">↘ falling</span>
      <span class="tag tag-flat">→ flat</span>
    </div>
  </div>
  <div class="group">
    <div class="group-label">Feature category tags</div>
    <div class="tags">
      <span class="tag tag-rust">burgundy</span>
      <span class="tag tag-sky">linen</span>
      <span class="tag tag-plum">blazer</span>
      <span class="tag tag-sage">midi</span>
      <span class="tag tag-mustard">Y2K</span>
    </div>
  </div>
  <div class="group">
    <div class="group-label">Recommendation badges</div>
    <div class="tags">
      <span class="tag tag-peak">★ list in 1 mo</span>
      <span class="tag tag-rising">★ list in 2 mo</span>
      <span class="tag tag-falling">↘ list now</span>
    </div>
  </div>
</body>
</html>
