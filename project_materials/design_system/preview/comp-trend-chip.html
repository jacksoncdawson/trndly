<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://rsms.me/"/>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"/>
<link rel="stylesheet" href="../tokens.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);font-family:var(--font-sans);padding:24px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--color-surface-2);
  border:2px solid var(--color-border);
  border-radius:var(--radius-full);
  padding:6px 12px;
  font-size:var(--text-xs);
  font-weight:600;
}
.dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--color-border)}
.chip-active{background:var(--color-primary);color:var(--color-primary-fg)}
.chip-active .dot{border-color:rgba(255,255,255,.4)}
</style>
</head>
<body>
<div class="row">
  <span class="chip chip-active"><span class="dot" style="background:#fbf6ee"></span>color</span>
  <span class="chip"><span class="dot" style="background:var(--color-pop-sky)"></span>material</span>
  <span class="chip"><span class="dot" style="background:var(--color-pop-plum)"></span>product type</span>
  <span class="chip" style="opacity:.5"><span class="dot" style="background:var(--color-pop-sage)"></span>silhouette</span>
  <span class="chip" style="opacity:.5"><span class="dot" style="background:var(--color-pop-mustard)"></span>era</span>
</div>
</body>
</html>
